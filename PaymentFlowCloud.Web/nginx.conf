server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # 容器环境里通过 Docker DNS 动态解析 API，避免 API 重建后 nginx 继续使用旧 IP。
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $api_upstream http://api:8080;

    # 前端使用同源路径调用订单 API，再由 nginx 转发到 compose 内部的 api 服务。
    location /orders {
        proxy_pass $api_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 前端使用同源路径调用支付 API，再由 nginx 转发到 compose 内部的 api 服务。
    location /payments {
        proxy_pass $api_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # React 单页应用刷新页面时回退到 index.html。
    location / {
        try_files $uri $uri/ /index.html;
    }
}
