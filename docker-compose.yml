services:

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: paymentflowcloud-sql
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "YourStrongPassword123!"
    ports:
      - "1433:1433"
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$${MSSQL_SA_PASSWORD}\" -C -Q \"SELECT 1\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

  rabbitmq:
    image: rabbitmq:management
    container_name: paymentflowcloud-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12

  seq:
    image: datalust/seq
    container_name: paymentflowcloud-seq
    environment:
      ACCEPT_EULA: "Y"
      SEQ_FIRSTRUN_NOAUTHENTICATION: "true"
    ports:
      - "5341:80"

  api:
    build:
      context: .
      dockerfile: PaymentFlowCloud.Api/Dockerfile
    container_name: paymentflowcloud-api
    depends_on:
      sqlserver:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      ASPNETCORE_URLS: "http://+:8080"
      ConnectionStrings__SqlServer: "Server=sqlserver,1433;Database=PaymentFlowCloudDb;User Id=sa;Password=YourStrongPassword123!;TrustServerCertificate=True;"
      RabbitMQ__HostName: "rabbitmq"
      RabbitMQ__Port: "5672"
      RabbitMQ__UserName: "guest"
      RabbitMQ__Password: "guest"
      RabbitMQ__QueueName: "payment-created"
      RabbitMQ__DeadLetterQueueName: "payment-created-dlq"
      RabbitMQ__MaxRetryCount: "3"
      RabbitMQ__PrefetchCount: "10"
      RabbitMQ__MaxConcurrentMessages: "5"
      Seq__ServerUrl: "http://seq:80"
      FakeProviderWebhook__Secret: "local-dev-provider-webhook-secret"
      FakeProviderWebhook__TimestampToleranceSeconds: "300"
    ports:
      - "5147:8080"

  worker:
    build:
      context: .
      dockerfile: PaymentFlowCloud.Worker/Dockerfile
    depends_on:
      sqlserver:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      api:
        condition: service_started
      provider-mock:
        condition: service_started
    environment:
      DOTNET_ENVIRONMENT: "Development"
      ConnectionStrings__SqlServer: "Server=sqlserver,1433;Database=PaymentFlowCloudDb;User Id=sa;Password=YourStrongPassword123!;TrustServerCertificate=True;"
      RabbitMQ__HostName: "rabbitmq"
      RabbitMQ__Port: "5672"
      RabbitMQ__UserName: "guest"
      RabbitMQ__Password: "guest"
      RabbitMQ__QueueName: "payment-created"
      RabbitMQ__DeadLetterQueueName: "payment-created-dlq"
      RabbitMQ__MaxRetryCount: "3"
      RabbitMQ__PrefetchCount: "10"
      RabbitMQ__MaxConcurrentMessages: "5"
      Seq__ServerUrl: "http://seq:80"
      FakeProvider__BaseUrl: "http://provider-mock:8080"
      FakeProvider__WebhookUrl: "http://api:8080/webhooks/fake-provider/payment-succeeded"
      FakeProvider__TimeoutSeconds: "5"

  provider-mock:
    build:
      context: .
      dockerfile: PaymentFlowCloud.ProviderMock/Dockerfile
    container_name: paymentflowcloud-provider-mock
    environment:
      ASPNETCORE_URLS: "http://+:8080"
      Seq__ServerUrl: "http://seq:80"
      ProviderMock__Mode: "${PROVIDER_MOCK_MODE:-Success}"
      ProviderMock__WebhookSecret: "local-dev-provider-webhook-secret"
      ProviderMock__WebhookDelaySeconds: "3"
      ProviderMock__TimeoutDelaySeconds: "10"
    ports:
      - "5290:8080"

  web:
    build:
      context: .
      dockerfile: PaymentFlowCloud.Web/Dockerfile
    container_name: paymentflowcloud-web
    depends_on:
      api:
        condition: service_started
    ports:
      - "5173:80"

  k6:
    image: grafana/k6
    profiles:
      - loadtest
    depends_on:
      api:
        condition: service_started
      worker:
        condition: service_started
      provider-mock:
        condition: service_started
    environment:
      BASE_URL: "http://api:8080"
      VUS: "20"
      ITERATIONS: "20"
      FINAL_STATUS_TIMEOUT_SECONDS: "15"
    volumes:
      - ./scripts:/scripts:ro
    command: ["run", "/scripts/payment-idempotency.k6.js"]

  k6-throughput:
    image: grafana/k6
    profiles:
      - loadtest
    depends_on:
      api:
        condition: service_started
      worker:
        condition: service_started
      provider-mock:
        condition: service_started
    environment:
      BASE_URL: "http://api:8080"
      VUS: "10"
      ITERATIONS: "20"
      FINAL_STATUS_TIMEOUT_SECONDS: "20"
    volumes:
      - ./scripts:/scripts:ro
    command: ["run", "/scripts/payment-throughput.k6.js"]

  k6-api-throughput:
    image: grafana/k6
    profiles:
      - loadtest
    depends_on:
      api:
        condition: service_started
    environment:
      BASE_URL: "http://api:8080"
      VUS: "20"
      ITERATIONS: "100"
    volumes:
      - ./scripts:/scripts:ro
    command: ["run", "/scripts/api-throughput.k6.js"]

  k6-webhook-duplicate:
    image: grafana/k6
    profiles:
      - loadtest
    depends_on:
      api:
        condition: service_started
      worker:
        condition: service_started
      provider-mock:
        condition: service_started
    environment:
      BASE_URL: "http://api:8080"
      DUPLICATE_WEBHOOK_COUNT: "3"
      FINAL_STATUS_TIMEOUT_SECONDS: "20"
      WEBHOOK_SECRET: "local-dev-provider-webhook-secret"
    volumes:
      - ./scripts:/scripts:ro
    command: ["run", "/scripts/webhook-duplicate.k6.js"]

  k6-provider-failure:
    image: grafana/k6
    profiles:
      - loadtest
    depends_on:
      api:
        condition: service_started
      worker:
        condition: service_started
      provider-mock:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    environment:
      BASE_URL: "http://api:8080"
      RABBITMQ_MANAGEMENT_URL: "http://rabbitmq:15672"
      RABBITMQ_QUEUE_VHOST: "/"
      RABBITMQ_DLQ_NAME: "payment-created-dlq"
      RABBITMQ_USER: "guest"
      RABBITMQ_PASSWORD: "guest"
      DLQ_TIMEOUT_SECONDS: "20"
    volumes:
      - ./scripts:/scripts:ro
    command: ["run", "/scripts/provider-failure-dlq.k6.js"]
